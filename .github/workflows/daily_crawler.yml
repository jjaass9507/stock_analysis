name: Daily Stock Crawler

on:
  schedule:
    # 每週一至五 06:30 UTC（台灣時間 14:30，收盤後一小時）
    - cron: '30 6 * * 1-5'
  workflow_dispatch:
    # 允許手動觸發

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        env:
          NEON_DB_URL: ${{ secrets.NEON_DB_URL }}
        run: |
          python - <<'EOF'
          import sys
          from thread import run_crawler_pipeline
          result = run_crawler_pipeline()
          print(result)
          sys.exit(0 if result.startswith("✅") else 1)
          EOF
